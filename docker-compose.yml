services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - backend
    restart: unless-stopped
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Use inline env to point to the mongo service created below
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=portfolio
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
    restart: unless-stopped
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
